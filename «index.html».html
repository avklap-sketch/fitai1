<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    background:#0f172a;
    color:white;
    text-align:center;
    font-family:Arial;
}

.btn {
    width:90%;
    padding:20px;
    margin:15px;
    font-size:20px;
    border-radius:15px;
    border:none;
    background:#22c55e;
    color:white;
}

.card {
    background:#1e293b;
    padding:20px;
    border-radius:15px;
    margin:15px;
}
</style>
</head>

<body>

<h2>🔥 FitAI PRO</h2>

<button class="btn" onclick="workout()">💪 Тренировки</button>
<button class="btn" onclick="food()">🍽 Питание</button>
<button class="btn" onclick="weight()">⚖️ Вес</button>

<div id="content"></div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

// 💪 ТРЕНИРОВКИ
function workout() {
    document.getElementById("content").innerHTML =
    '<div class="card">' +
    '<h3>Выбери цель</h3>' +
    '<button class="btn" onclick="sendWorkoutFat()">🔥 Похудение</button>' +
    '<button class="btn" onclick="sendWorkoutMass()">💪 Масса</button>' +
    '</div>';
}

function sendWorkoutFat() {
    tg.sendData("workout_fat");
    tg.close();
}

function sendWorkoutMass() {
    tg.sendData("workout_mass");
    tg.close();
}

// 🍽 ПИТАНИЕ
function food() {
    document.getElementById("content").innerHTML =
    '<div class="card">' +
    '<h3>Какая цель?</h3>' +
    '<button class="btn" onclick="sendFoodFat()">🔥 Похудение</button>' +
    '<button class="btn" onclick="sendFoodMass()">💪 Набор массы</button>' +
    '</div>';
}

function sendFoodFat() {
    tg.sendData("food_fat");
    tg.close();
}

function sendFoodMass() {
    tg.sendData("food_mass");
    tg.close();
}

// ⚖️ ВЕС
function weight() {
    document.getElementById("content").innerHTML =
    '<div class="card">' +
    '<input id="w" placeholder="Введите вес">' +
    '<button class="btn" onclick="save()">Сохранить</button>' +
    '</div>';
}

function save() {
    let w = document.getElementById("w").value;

    if (!w) {
        alert("введи вес");
        return;
    }

    tg.sendData("weight:" + w);
    tg.close();
}
</script>

</body>
</html>
