<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0f172a;
    color:white;
}

/* --- ЭКРАНЫ --- */
.screen { display:none; padding-bottom:80px; }
.active { display:block; }

/* --- КАРТОЧКИ --- */
.card {
    background:#1e293b;
    margin:10px;
    padding:15px;
    border-radius:20px;
}

/* --- КНОПКИ --- */
button {
    width:100%;
    padding:15px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    background:#3b82f6;
    color:white;
}

/* --- INPUT --- */
input {
    width:100%;
    padding:10px;
    border-radius:10px;
}

/* --- МЕНЮ --- */
.navbar {
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    background:#020617;
}

.navbar button {
    flex:1;
    padding:15px;
    background:none;
    color:white;
    border:none;
}

/* --- ВИДЕО --- */
.video {
    width:100%;
    border-radius:15px;
    margin-top:10px;
}
</style>
</head>

<body>

<!-- 👤 КАБИНЕТ -->
<div id="home" class="screen active">
<div class="card">
<h3>👤 Личный кабинет</h3>
<p>ID: <span id="user"></span></p>
<p>Статус: <span id="status"></span></p>
<button onclick="buyPro()">💎 Купить PRO</button>
</div>
</div>

<!-- ⚖️ ВЕС -->
<div id="weightScreen" class="screen">
<div class="card">
<h3>⚖️ Вес</h3>
<input id="weight">
<button onclick="saveWeight()">Сохранить</button>
</div>

<div class="card">
<h3>📈 График</h3>
<canvas id="chart"></canvas>
</div>
</div>

<!-- 💪 ТРЕНИРОВКИ -->
<div id="workoutScreen" class="screen">
<div class="card">
<h3>💪 Программы</h3>

<button onclick="showProgram('home')">🏠 Дом</button>
<button onclick="showProgram('gym')">🏋️ Зал</button>
<button onclick="showProgram('fat')">🔥 Снижение веса</button>

<div id="program"></div>

</div>
</div>

<!-- 🤖 AI -->
<div id="aiScreen" class="screen">
<div class="card">
<h3>🤖 AI тренер</h3>
<button onclick="send('ai')">Задать вопрос</button>
</div>
</div>

<!-- 🔻 МЕНЮ -->
<div class="navbar">
<button onclick="openScreen('home')">🏠</button>
<button onclick="openScreen('weightScreen')">⚖️</button>
<button onclick="openScreen('workoutScreen')">💪</button>
<button onclick="openScreen('aiScreen')">🤖</button>
</div>

<script>
let tg = window.Telegram.WebApp;
tg.expand();

let user = tg.initDataUnsafe.user;
let userId = user ? user.id : 1;

document.getElementById("user").innerText = userId;

let SERVER = "https://hemizygous-grainier-ava.ngrok-free.dev";

/* --- ПЕРЕКЛЮЧЕНИЕ ЭКРАНОВ --- */
function openScreen(id) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

/* --- ПРО --- */
async function checkPro() {
    let res = await fetch(SERVER + "/check_pro?user_id=" + userId);
    let data = await res.json();

    document.getElementById("status").innerText =
        data.pro ? "PRO 💎" : "FREE";
}

/* --- ВЕС --- */
function saveWeight() {
    let w = document.getElementById("weight").value;

    fetch(SERVER + "/save_weight?user_id=" + userId + "&weight=" + w);

    tg.sendData("weight:" + w);

    setTimeout(loadChart, 500);
}

/* --- ГРАФИК --- */
let chart;

async function loadChart() {
    let res = await fetch(SERVER + "/get_weights?user_id=" + userId);
    let data = await res.json();

    let ctx = document.getElementById("chart");

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: data.weights.map((_, i) => i + 1),
            datasets: [{
                label: 'Вес',
                data: data.weights
            }]
        }
    });
}

/* --- ПРОГРАММЫ --- */
function showProgram(type) {
    let p = document.getElementById("program");

    if (type === "home") {
        p.innerHTML = `
        <h4>Дом</h4>
        <iframe class="video" src="https://www.youtube.com/embed/UItWltVZZmE"></iframe>
        `;
    }

    if (type === "gym") {
        p.innerHTML = `
        <h4>Зал</h4>
        <iframe class="video" src="https://www.youtube.com/embed/2pLT-olgUJs"></iframe>
        `;
    }

    if (type === "fat") {
        p.innerHTML = `
        <h4>Снижение веса</h4>
        <iframe class="video" src="https://www.youtube.com/embed/ml6cT4AZdqI"></iframe>
        `;
    }
}

/* --- КНОПКИ --- */
function send(t) { tg.sendData(t); }
function buyPro() { tg.sendData("buy_pro"); }

/* --- PUSH (через бота) --- */
setInterval(() => {
    tg.sendData("reminder");
}, 60000);

checkPro();
loadChart();
</script>

</body>
</html>
