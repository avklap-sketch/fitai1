<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background:#0f172a;
    color:white;
    font-family:Arial;
    margin:0;
}

.card {
    background:#1e293b;
    padding:15px;
    margin:10px;
    border-radius:15px;
}

button {
    width:100%;
    padding:15px;
    margin-top:10px;
    border-radius:10px;
    border:none;
}

input {
    width:100%;
    padding:10px;
}
</style>
</head>

<body>

<div class="card">
<h2>👤 Личный кабинет</h2>
<p>ID: <span id="user"></span></p>
<p>Статус: <span id="status">...</span></p>
<button onclick="buyPro()">💎 Купить PRO</button>
</div>

<div class="card">
<h3>⚖️ Вес</h3>
<input id="weight" placeholder="Введите вес">
<button onclick="saveWeight()">Сохранить</button>
</div>

<div class="card">
<h3>📈 График веса</h3>
<canvas id="chart"></canvas>
</div>

<div class="card">
<button onclick="send('food')">🍽 Питание</button>
<button onclick="send('workout')">💪 Тренировки</button>
<button onclick="askAI()">🤖 AI тренер</button>
</div>

<script>
let tg = window.Telegram.WebApp;
tg.expand();

let user = tg.initDataUnsafe.user;
let userId = user ? user.id : 1;

document.getElementById("user").innerText = userId;

let SERVER = "https://hemizygous-grainier-ava.ngrok-free.dev";

// --- ПРО ---
async function checkPro() {
    let res = await fetch(SERVER + "/check_pro?user_id=" + userId);
    let data = await res.json();

    document.getElementById("status").innerText =
        data.pro ? "PRO 💎" : "FREE";
}

// --- СОХРАНИТЬ ВЕС ---
function saveWeight() {
    let w = document.getElementById("weight").value;

    fetch(SERVER + "/save_weight?user_id=" + userId + "&weight=" + w);

    tg.sendData("weight:" + w);

    setTimeout(loadChart, 500);
}

// --- ГРАФИК ---
let chart;

async function loadChart() {
    let res = await fetch(SERVER + "/get_weights?user_id=" + userId);
    let data = await res.json();

    let ctx = document.getElementById("chart");

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: data.weights.map((_, i) => i + 1),
            datasets: [{
                label: 'Вес',
                data: data.weights
            }]
        }
    });
}

// --- AI ---
function askAI() {
    tg.sendData("ai");
}

// --- КНОПКИ ---
function send(t) { tg.sendData(t); }
function buyPro() { tg.sendData("buy_pro"); }

checkPro();
loadChart();
</script>

</body>
</html>
