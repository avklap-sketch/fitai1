<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FitAI</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
    body {
        margin: 0;
        font-family: -apple-system, Arial;
        background: #0f172a;
        color: white;
    }

    .container {
        padding: 20px;
    }

    h1 {
        text-align: center;
        margin-top: 10px;
    }

    .card {
        background: #1e293b;
        border-radius: 20px;
        padding: 20px;
        margin-top: 20px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    }

    .input {
        width: 100%;
        padding: 15px;
        border-radius: 12px;
        border: none;
        margin-top: 10px;
        font-size: 16px;
    }

    .btn {
        width: 100%;
        padding: 18px;
        border: none;
        border-radius: 15px;
        margin-top: 15px;
        font-size: 16px;
        font-weight: bold;
    }

    .green { background: #22c55e; color: white; }
    .blue { background: #3b82f6; color: white; }
    .purple { background: #a855f7; color: white; }

</style>
</head>

<body>

<div class="container">

<h1>🏋️ FitAI</h1>

<div class="card">
    <h3>⚖️ Вес</h3>
    <input id="weight" class="input" placeholder="Введите вес">
    <button class="btn green" onclick="saveWeight()">Сохранить</button>
</div>

<div class="card">
    <h3>🍽 Питание</h3>
    <button class="btn blue" onclick="sendData('food')">Открыть</button>
</div>

<div class="card">
    <h3>💪 Тренировки</h3>
    <button class="btn purple" onclick="sendData('workout')">Открыть</button>
</div>

</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    function saveWeight() {
        let weight = document.getElementById("weight").value;

        if (!weight) {
            alert("Введите вес");
            return;
        }

        tg.sendData("weight:" + weight);
    }

    function sendData(type) {
        tg.sendData(type);
    }
</script>

</body>
</html>
