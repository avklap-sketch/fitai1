<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FitAI</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

.card {
    background: #1e293b;
    margin: 10px;
    padding: 15px;
    border-radius: 15px;
}

button {
    width: 100%;
    padding: 15px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
}
</style>
</head>

<body>

<div class="card">
    <h3>⚖️ Вес</h3>
    <input id="weight" placeholder="Введите вес">
    <button onclick="saveWeight()">Сохранить</button>
</div>

<div class="card">
    <button onclick="send('food')">🍽 Питание</button>
    <button onclick="send('workout')">💪 Тренировки</button>
</div>

<div class="card">
    <h3>👤 Статус: <span id="status">FREE</span></h3>
    <button onclick="buyPro()">💎 Купить PRO</button>
</div>

<script>
let tg = window.Telegram.WebApp;
tg.expand();

// --- ВЕС ---
function saveWeight() {
    let w = document.getElementById("weight").value;
    if (!w) return alert("Введите вес");

    localStorage.setItem("weight", w);
    tg.sendData("weight:" + w);
}

// --- ОТПРАВКА ---
function send(type) {
    tg.sendData(type);
}

// --- PRO ---
function buyPro() {
    tg.sendData("buy_pro");
}

// --- ПРОВЕРКА PRO (локально после оплаты)
function checkPro() {
    if (localStorage.getItem("pro") == "1") {
        document.getElementById("status").innerText = "PRO 💎";
    }
}

checkPro();
</script>

</body>
</html>
