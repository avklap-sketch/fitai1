<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body { background:#0f172a; color:white; font-family:Arial; }
.card { background:#1e293b; padding:15px; margin:10px; border-radius:15px; }
button { width:100%; padding:15px; margin-top:10px; }
</style>
</head>

<body>

<div class="card">
<h3>⚖️ Вес</h3>
<input id="weight">
<button onclick="saveWeight()">Сохранить</button>
</div>

<div class="card">
<button onclick="send('food')">🍽 Питание</button>
<button onclick="send('workout')">💪 Тренировки</button>
</div>

<div class="card">
<h3>👤 Статус: <span id="status">...</span></h3>
<button onclick="buyPro()">💎 Купить PRO</button>
</div>

<div class="card">
<h3>📈 История веса</h3>
<div id="weights"></div>
</div>

<script>
let tg = window.Telegram.WebApp;
tg.expand();

let user = tg.initDataUnsafe.user;
let userId = user ? user.id : null;

let SERVER = "https://hemizygous-grainier-ava.ngrok-free.dev";

// --- ПРО ---
async function checkPro() {
    let res = await fetch(SERVER + "/check_pro?user_id=" + userId);
    let data = await res.json();

    document.getElementById("status").innerText =
        data.pro ? "PRO 💎" : "FREE";
}

// --- ВЕС ---
function saveWeight() {
    let w = document.getElementById("weight").value;

    fetch(SERVER + "/save_weight?user_id=" + userId + "&weight=" + w);

    tg.sendData("weight:" + w);
}

// --- ИСТОРИЯ ---
async function loadWeights() {
    let res = await fetch(SERVER + "/get_weights?user_id=" + userId);
    let data = await res.json();

    document.getElementById("weights").innerText =
        data.weights.join(" → ");
}

// --- КНОПКИ ---
function send(t) { tg.sendData(t); }
function buyPro() { tg.sendData("buy_pro"); }

checkPro();
loadWeights();
</script>

</body>
</html>
