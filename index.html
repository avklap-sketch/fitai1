<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(180deg, #0f172a, #020617);
    color:white;
}

.header {
    padding:20px;
    font-size:22px;
    font-weight:bold;
}

.card {
    background:#1e293b;
    margin:10px;
    padding:15px;
    border-radius:20px;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
}

button {
    width:100%;
    padding:15px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    background:#3b82f6;
    color:white;
    font-size:16px;
}

input {
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
}

.pro {
    color: gold;
}

.free {
    color: #9ca3af;
}

.video {
    width:100%;
    border-radius:15px;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="header">🏋️ FitAI</div>

<div class="card">
<h3>👤 Личный кабинет</h3>
<p>ID: <span id="user"></span></p>
<p>Статус: <span id="status"></span></p>
<button onclick="buyPro()">💎 Купить PRO</button>
</div>

<div class="card">
<h3>⚖️ Вес</h3>
<input id="weight" placeholder="Введите вес">
<button onclick="saveWeight()">Сохранить</button>
</div>

<div class="card">
<h3>📈 Прогресс</h3>
<canvas id="chart"></canvas>
</div>

<div class="card">
<h3>💪 Тренировки</h3>

<button onclick="showVideos()">Показать тренировки</button>

<div id="videos"></div>
</div>

<div class="card">
<button onclick="send('food')">🍽 Питание</button>
<button onclick="send('workout')">💪 План тренировок</button>
<button onclick="send('ai')">🤖 AI тренер</button>
</div>

<script>
let tg = window.Telegram.WebApp;
tg.expand();

let user = tg.initDataUnsafe.user;
let userId = user ? user.id : 1;

document.getElementById("user").innerText = userId;

let SERVER = "https://hemizygous-grainier-ava.ngrok-free.dev";

// --- ПРО ---
async function checkPro() {
    let res = await fetch(SERVER + "/check_pro?user_id=" + userId);
    let data = await res.json();

    let status = document.getElementById("status");

    if (data.pro) {
        status.innerText = "PRO 💎";
        status.className = "pro";
    } else {
        status.innerText = "FREE";
        status.className = "free";
    }
}

// --- ВЕС ---
function saveWeight() {
    let w = document.getElementById("weight").value;

    fetch(SERVER + "/save_weight?user_id=" + userId + "&weight=" + w);

    tg.sendData("weight:" + w);

    setTimeout(loadChart, 500);
}

// --- ГРАФИК ---
let chart;

async function loadChart() {
    let res = await fetch(SERVER + "/get_weights?user_id=" + userId);
    let data = await res.json();

    let ctx = document.getElementById("chart");

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: data.weights.map((_, i) => i + 1),
            datasets: [{
                label: 'Вес',
                data: data.weights,
                borderWidth: 3
            }]
        }
    });
}

// --- ВИДЕО ---
function showVideos() {
    let v = document.getElementById("videos");

    v.innerHTML = `
        <iframe class="video" src="https://www.youtube.com/embed/UItWltVZZmE"></iframe>
        <iframe class="video" src="https://www.youtube.com/embed/2pLT-olgUJs"></iframe>
    `;
}

// --- КНОПКИ ---
function send(t) { tg.sendData(t); }
function buyPro() { tg.sendData("buy_pro"); }

checkPro();
loadChart();
</script>

</body>
</html>
